{% extends 'reciever_base.html' %}
{% block title %}Route{% endblock %}

{% block content %}
<div id="map" class="w-full h-[70vh] rounded shadow"></div>
{% endblock %}

{% block extra_scripts %}
<script>
  let map, directionsService, directionsRenderer;

  
  const acceptedRequests = {{ locations|safe }};  // Example: [[27.6720, 85.3240], [27.6675, 85.3230]]

  function initMap() {
    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({
      suppressMarkers: false,
      preserveViewport: true
    });

    map = new google.maps.Map(document.getElementById("map"), {
      center: { lat: 27.6675, lng: 85.3230 },
      zoom: 14
    });

    directionsRenderer.setMap(map);

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(position => {
        const origin = {
          lat: position.coords.latitude,
          lng: position.coords.longitude
        };

        // Add marker at current location
        new google.maps.Marker({
          position: origin,
          map,
          title: "Your Location",
          icon: "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
        });

        if (acceptedRequests.length === 0) {
          alert("No accepted request locations available.");
          return;
        }

        // Use the last location as destination
        const destination = new google.maps.LatLng(
          acceptedRequests[acceptedRequests.length - 1][0],
          acceptedRequests[acceptedRequests.length - 1][1]
        );

        // Intermediate locations as waypoints
        const waypoints = acceptedRequests.slice(0, -1).map(loc => ({
          location: new google.maps.LatLng(loc[0], loc[1]),
          stopover: true
        }));

        directionsService.route({
          origin: origin,
          destination: destination,
          waypoints: waypoints,
          optimizeWaypoints: true,
          travelMode: google.maps.TravelMode.DRIVING
        }, (response, status) => {
          if (status === google.maps.DirectionsStatus.OK) {
            directionsRenderer.setDirections(response);
          } else {
            alert("Directions request failed due to " + status);
          }
        });

      }, () => {
        alert("Geolocation failed. Please allow location access.");
      });
    } else {
      alert("Geolocation is not supported by this browser.");
    }
  }

  // Set initMap as the callback for Google Maps API
  window.initMap = initMap;
</script>

<!-- Google Maps API Script  -->
<script 
    async 
    defer 
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAw45RNLqsGBiiZTVpsg88p8rSc6lZMRkA&callback=initMap">
</script>


{% endblock %}
